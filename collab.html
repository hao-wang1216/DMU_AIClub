<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DMU AI Community | 本科生招新</title>
  <meta name="description" content="DMU AI Community  招新页：要求与联系方式。" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="collab-page">
  <header class="site-header" id="top">
    <div class="container nav-wrap">
      <a class="brand" href="./index.html">
        <span class="brand-mark">MVL</span>
        <span class="brand-text">DMU AI Community</span>
      </a>
      <button class="menu-btn" id="menuBtn" aria-label="切换导航">菜单</button>
      <nav id="nav" class="nav-links">
        <a href="#requirements">要求</a>
        <a href="#contact">联系方式</a>
        <a href="./index.html">返回门户</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-grid">
        <div>
          <p class="eyebrow">Join Us</p>
          <h1>本科生招新</h1>
          <p class="hero-sub">本页仅提供招新要求和联系方式。</p>
          <div class="hero-actions">
            <a class="btn btn-primary" href="#requirements">查看要求</a>
            <a class="btn btn-ghost" href="#contact">联系报名</a>
          </div>
        </div>
      </div>
    </section>

    <section class="section" id="requirements">
      <div class="container">
        <h2>要求</h2>
        <article class="card">
          <ul>
            <li>每周稳定投入 8-12 小时</li>
            <li>具备 Python / 深度学习基础</li>
            <li>愿意长期做实验与复盘</li>
          </ul>
        </article>
      </div>
    </section>

    <section class="section alt" id="contact">
      <div class="container">
        <h2>联系方式</h2>
        <article class="join-card">
          <p>邮箱：<a href="mailto:your-group-email@dmu.edu.cn">your-group-email@dmu.edu.cn</a></p>
          <p>GitHub：<a href="https://github.com/your-org">https://github.com/your-org</a></p>
          <p>地址：Dalian Maritime University</p>
          <div class="hero-actions">
            <a class="btn btn-primary" href="mailto:your-group-email@dmu.edu.cn">发送邮件</a>
            <a class="btn btn-ghost" href="./index.html">返回门户</a>
          </div>
        </article>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-wrap">
      <p>© 2026 DMU AI Community </p>
      <p>Join Us</p>
    </div>
  </footer>

  <script src="./script.js"></script>
</body>
</html>
